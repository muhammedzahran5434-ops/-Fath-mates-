<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Academic Portal - Darul Hasanath</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
:root{--bg0:#040806;--bg1:#081210;--bg2:#0d1a15;--bg3:#12211a;--bg4:#193027;--ac:#22c55e;--acd:#16a34a;--acg:rgba(34,197,94,.09);--acg2:rgba(34,197,94,.18);--gd:#eab308;--gdg:rgba(234,179,8,.08);--gdg2:rgba(234,179,8,.18);--t1:#eaf5ee;--t2:#8fae99;--t3:#4e6e58;--bd:#1c3025;--dn:#ef4444;--dng:rgba(239,68,68,.09);--inf:#3b82f6;--infg:rgba(59,130,246,.09);--pn:#818cf8;--png:rgba(129,140,248,.09);--pk:#f472b6;--pkg:rgba(244,114,182,.09);--safe-b:env(safe-area-inset-bottom,0px)}
.light{--bg0:#f4f8f5;--bg1:#eaf2ed;--bg2:#fff;--bg3:#f0f7f2;--bg4:#e2ede6;--ac:#16a34a;--acd:#15803d;--acg:rgba(22,163,74,.07);--acg2:rgba(22,163,74,.15);--gd:#ca8a04;--gdg:rgba(202,138,4,.07);--gdg2:rgba(202,138,4,.15);--t1:#0a1a0f;--t2:#3d6b4e;--t3:#7aab8e;--bd:#c8ddd0;--dng:rgba(239,68,68,.07);--infg:rgba(59,130,246,.07);--png:rgba(129,140,248,.07);--pkg:rgba(244,114,182,.07)}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'DM Sans',sans-serif;background:var(--bg0);color:var(--t1);min-height:100vh;min-height:100dvh;overflow-x:hidden;transition:background .4s,color .4s}h1,h2,h3,h4{font-family:'Playfair Display',serif}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg1)}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}
html,body{width:100%;height:100%}
.inp{background:var(--bg1);border:1px solid var(--bd);color:var(--t1);padding:12px 14px;border-radius:10px;width:100%;font-family:'DM Sans',sans-serif;font-size:16px;transition:all .25s;outline:none;-webkit-appearance:none}.inp:focus{border-color:var(--ac);box-shadow:0 0 0 3px var(--acg)}.inp::placeholder{color:var(--t3)}select.inp{cursor:pointer}select.inp option{background:var(--bg2)}textarea.inp{resize:vertical;min-height:80px}
.bp{background:linear-gradient(135deg,var(--acd),var(--ac));color:#fff;padding:12px 22px;border-radius:10px;border:none;font-family:'DM Sans',sans-serif;font-weight:600;font-size:14px;cursor:pointer;transition:all .25s;white-space:nowrap}.bp:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(34,197,94,.25)}.bp:active{transform:scale(.97)}.bp:disabled{opacity:.5;cursor:not-allowed;transform:none!important;box-shadow:none!important}
.bs{background:var(--bg3);color:var(--t2);padding:10px 18px;border-radius:10px;border:1px solid var(--bd);font-family:'DM Sans',sans-serif;font-weight:500;font-size:13px;cursor:pointer;transition:all .25s}.bs:hover{background:var(--bg4);color:var(--t1);border-color:var(--acd)}.bs:active{transform:scale(.97)}
.bd{background:var(--dng);color:var(--dn);padding:6px 12px;border-radius:8px;border:1px solid rgba(239,68,68,.2);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;transition:all .2s}.bd:hover{background:rgba(239,68,68,.15)}
.bgt{background:linear-gradient(135deg,#ca8a04,#eab308);color:#1a1a00;padding:10px 20px;border-radius:10px;border:none;font-family:'DM Sans',sans-serif;font-weight:600;font-size:13px;cursor:pointer;transition:all .25s}.bgt:hover{box-shadow:0 5px 18px rgba(234,179,8,.25);transform:translateY(-1px)}
.bico{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;border:1px solid var(--bd);background:var(--bg3);color:var(--t2);cursor:pointer;transition:all .2s;font-size:15px}.bico:hover{background:var(--acg);color:var(--ac);border-color:var(--acd)}
.sidebar{background:var(--bg2);border-right:1px solid var(--bd);transition:transform .3s,background .4s;z-index:50;width:250px;flex-shrink:0}
.ni{display:flex;align-items:center;gap:11px;padding:10px 16px;border-radius:10px;cursor:pointer;transition:all .2s;color:var(--t2);font-size:13.5px;font-weight:500;margin:2px 0;position:relative}.ni:hover{background:var(--acg);color:var(--t1)}.ni.on{background:var(--acg2);color:var(--ac);font-weight:600}.ni.on::before{content:'';position:absolute;left:0;top:18%;bottom:18%;width:3px;border-radius:0 3px 3px 0;background:var(--ac)}.ni i{width:20px;text-align:center;font-size:14px}
.card{background:var(--bg3);border:1px solid var(--bd);border-radius:14px;padding:20px;transition:all .3s;position:relative;overflow:hidden}.card:hover{border-color:color-mix(in srgb,var(--acd) 50%,transparent)}.card-glow::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--ac),var(--gd));opacity:0;transition:opacity .3s}.card-glow:hover::before{opacity:1}
.mc{background:var(--bg3);border:1px solid var(--bd);border-radius:14px;padding:18px;cursor:pointer;transition:all .3s}.mc:hover{border-color:var(--acd);transform:translateY(-2px);box-shadow:0 10px 25px rgba(0,0,0,.2)}.mc:active{transform:scale(.98)}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;flex-shrink:0}.avs{width:40px;height:40px;font-size:14px}.avm{width:52px;height:52px;font-size:17px}.avl{width:80px;height:80px;font-size:28px}
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:20px;font-size:10.5px;font-weight:600}.ba{background:var(--gdg2);color:var(--gd);border:1px solid rgba(234,179,8,.2)}.bm{background:var(--acg2);color:var(--ac);border:1px solid rgba(34,197,94,.15)}.bin{background:var(--infg);color:var(--inf);border:1px solid rgba(59,130,246,.2)}
.tab{padding:9px 18px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;border:1px solid transparent;background:transparent;color:var(--t3);font-family:'DM Sans',sans-serif}.tab:hover{color:var(--t2);background:var(--acg)}.tab.on{background:var(--acg2);color:var(--ac);border-color:color-mix(in srgb,var(--acd) 40%,transparent)}
.stg{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:22px;font-size:13px;background:var(--acg);color:var(--ac);border:1px solid rgba(34,197,94,.15);transition:all .2s}.stg:hover{border-color:var(--ac)}.stg .rx{cursor:pointer;opacity:.4;transition:opacity .2s;font-size:11px}.stg .rx:hover{opacity:1}
.ach{background:var(--bg1);border:1px solid var(--bd);border-radius:12px;padding:16px;transition:all .2s}.ach:hover{border-color:var(--acd)}
.pb{height:6px;background:var(--bg1);border-radius:3px;overflow:hidden}.pf{height:100%;border-radius:3px;transition:width .8s cubic-bezier(.25,.46,.45,.94);background:linear-gradient(90deg,var(--acd),var(--ac))}
.toast{position:fixed;top:16px;right:16px;padding:13px 20px;border-radius:12px;font-size:14px;font-weight:500;z-index:9999;transform:translateX(130%);transition:transform .4s cubic-bezier(.175,.885,.32,1.275);max-width:340px;box-shadow:0 10px 30px rgba(0,0,0,.4);display:flex;align-items:center;gap:8px}.toast.show{transform:translateX(0)}.tok{background:#065f46;color:#a7f3d0;border:1px solid #10b981}.terr{background:#7f1d1d;color:#fca5a5;border:1px solid #ef4444}.tinf{background:#1e3a5f;color:#93c5fd;border:1px solid #3b82f6}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);z-index:200;display:none;align-items:center;justify-content:center;padding:12px}.modal-bg.show{display:flex}.modal-box{background:var(--bg2);border:1px solid var(--bd);border-radius:18px;padding:28px;max-width:500px;width:100%;max-height:88vh;overflow-y:auto;animation:mIn .3s ease}@keyframes mIn{from{opacity:0;transform:scale(.95) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.fi{animation:fi .35s ease}@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fl{display:block;font-size:11px;font-weight:600;color:var(--t2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:sp .6s linear infinite}@keyframes sp{to{transform:rotate(360deg)}}
.sdot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}.son{background:var(--ac);box-shadow:0 0 8px var(--ac)}.soff{background:var(--dn);box-shadow:0 0 8px var(--dn)}
.ann-card{border-left:3px solid var(--ac);padding:16px;background:var(--bg1);border-radius:0 12px 12px 0;transition:all .2s}.ann-card:hover{background:var(--bg4)}.ann-card.imp{border-left-color:var(--dn)}
.evt-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.lb-row{display:flex;align-items:center;gap:14px;padding:14px 18px;border-radius:12px;transition:all .2s}.lb-row:hover{background:var(--acg)}
.login-bg{min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;background:var(--bg0);width:100%}
#particles-canvas{position:absolute;inset:0;z-index:0}
.login-card{position:relative;z-index:2;background:var(--bg3);border:1px solid var(--bd);border-radius:22px;padding:40px 32px;max-width:420px;width:100%;box-shadow:0 30px 80px rgba(0,0,0,.4);margin:16px}
.login-card::before{content:'';position:absolute;top:-1px;left:15%;right:15%;height:2px;background:linear-gradient(90deg,transparent,var(--ac),transparent);border-radius:2px}
#pg-app{width:100%;min-height:100vh;min-height:100dvh}
.app-wrap{display:flex;width:100%;min-height:100vh;min-height:100dvh}
.main-area{flex:1;min-height:100vh;min-height:100dvh;overflow-y:auto;background:var(--bg0);width:100%}
@media(min-width:769px){.sidebar{display:flex;flex-direction:column;position:sticky;top:0;height:100vh}.mob-h{display:none!important}.mob-nav{display:none!important}#mc{padding:28px 32px;max-width:1200px;margin:0 auto}}
@media(max-width:768px){.sidebar{display:none!important}.app-wrap{flex-direction:column}.main-area{width:100%;padding-bottom:calc(72px + var(--safe-b))}.mob-h{display:flex!important;position:sticky;top:0;z-index:30;background:color-mix(in srgb,var(--bg2) 90%,transparent);backdrop-filter:blur(16px);border-bottom:1px solid var(--bd);padding:10px 14px;align-items:center;gap:10px}.mob-nav{display:flex!important;position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--bd);z-index:50;padding:6px 6px calc(6px + var(--safe-b));gap:2px;justify-content:space-around}.mob-nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 2px;border:none;background:none;color:var(--t3);font-size:9px;font-family:'DM Sans',sans-serif;cursor:pointer;border-radius:10px;transition:all .2s}.mob-nav button i{font-size:18px;margin-bottom:1px}.mob-nav button.on{color:var(--ac);background:var(--acg)}#mc{padding:16px 14px;max-width:100%;padding-bottom:16px}.card{padding:16px;border-radius:12px}.mc{padding:14px;border-radius:12px}.stat-grid{grid-template-columns:1fr 1fr!important}.bp,.bs,.bgt{min-height:44px}.tab{min-height:40px;font-size:12px;padding:8px 14px}.inp{font-size:16px;min-height:46px}}
</style>
</head>
<body>

<div id="pg-login" class="login-bg">
<canvas id="particles-canvas"></canvas>
<div class="login-card fi">
<div class="text-center mb-6">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl mb-3" style="background:linear-gradient(135deg,var(--acd),var(--ac));box-shadow:0 8px 25px rgba(34,197,94,.2)"><i class="fas fa-graduation-cap text-2xl text-white"></i></div>
<h1 class="text-2xl font-bold tracking-tight">Academic Portal</h1>
<p class="text-xs mt-1" style="color:var(--t3)">Darul Hasanath</p>
</div>
<div class="flex items-center justify-center gap-2 mb-3 text-xs" style="color:var(--t3)"><span class="sdot" id="fb-d1"></span><span id="fb-t1">Local Mode</span></div>
<form id="login-form">
<div class="mb-3"><label class="fl">Username</label><div class="relative"><i class="fas fa-user absolute left-3.5 top-1/2 -translate-y-1/2" style="color:var(--t3);font-size:13px"></i><input type="text" id="l-user" class="inp" style="padding-left:36px" placeholder="e.g. 815 or ADMINISTRATOR" autocomplete="off" required></div></div>
<div class="mb-5"><label class="fl">Password</label><div class="relative"><i class="fas fa-lock absolute left-3.5 top-1/2 -translate-y-1/2" style="color:var(--t3);font-size:13px"></i><input type="password" id="l-pass" class="inp" style="padding-left:36px;padding-right:40px" placeholder="e.g. 815@fath" required><span class="absolute right-3.5 top-1/2 -translate-y-1/2 cursor-pointer" style="color:var(--t3)" id="pw-toggle"><i class="fas fa-eye"></i></span></div></div>
<button type="submit" class="bp w-full flex items-center justify-center gap-2" id="l-btn" style="padding:14px"><i class="fas fa-sign-in-alt"></i> Sign In</button>
</form>
<div id="l-err" class="mt-3 text-center text-sm hidden" style="color:var(--dn)"></div>
<div class="mt-5 text-center text-xs" style="color:var(--t3)">Format: AdmissionNo@fath &middot; Admin: Anshif@29</div>
</div>
</div>

<div id="pg-app" style="display:none">
<div class="app-wrap">
<aside id="sb" class="sidebar">
<div class="p-4 border-b" style="border-color:var(--bd)"><div class="flex items-center gap-2.5"><div class="w-9 h-9 rounded-xl flex items-center justify-center" style="background:linear-gradient(135deg,var(--acd),var(--ac))"><i class="fas fa-graduation-cap text-white text-xs"></i></div><div><div class="font-bold text-sm">Academic Portal</div><div class="flex items-center gap-1.5 text-xs" style="color:var(--t3)"><span class="sdot" id="fb-d2"></span><span id="fb-t2">Local</span></div></div><button class="bico ml-auto" id="theme-btn"><i class="fas fa-moon" id="theme-ico"></i></button></div></div>
<div class="p-3 border-b" style="border-color:var(--bd)"><div class="flex items-center gap-2.5"><div id="sb-av" class="av avs"></div><div class="min-w-0"><div id="sb-nm" class="font-semibold text-sm truncate"></div><div id="sb-rl" class="badge mt-0.5"></div></div></div></div>
<nav class="flex-1 p-2 overflow-y-auto" id="sb-nav"></nav>
<div class="p-2 border-t" style="border-color:var(--bd)"><div class="ni" id="logout-btn" style="color:var(--dn)"><i class="fas fa-sign-out-alt"></i><span>Logout</span></div></div>
</aside>
<div class="main-area">
<div class="mob-h"><button class="bico" id="menu-btn"><i class="fas fa-bars"></i></button><span class="font-semibold text-sm flex-1">Academic Portal</span><button class="bico" id="theme-btn2"><i class="fas fa-moon" id="theme-ico2"></i></button></div>
<div id="mc"></div>
</div>
</div>
<div class="mob-nav" id="mob-nav"></div>
</div>

<div id="toasts"></div>
<div id="modal-bg" class="modal-bg"><div id="modal-box" class="modal-box"></div></div>

<script>
// ================================================================
//  FIREBASE CONFIG - PASTE YOUR CONFIG HERE
// ================================================================
var FB_CFG = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_PROJECT.appspot.com",
    messagingSenderId: "YOUR_ID",
    appId: "YOUR_APP_ID"
};
// ================================================================

var DEFAULT_ADNOS=['791','806','807','0808','089','810','811','812','813','814','815','816','817','818','820','821','822','823','824','825','826','827','828','829','830','831','832','833','834','835','836','849'];
var ACO=['#22c55e','#3b82f6','#8b5cf6','#ec4899','#f59e0b','#14b8a6','#f97316','#06b6d4','#6366f1','#84cc16'];
var NAV=[{id:'dashboard',icon:'fa-th-large',label:'Dashboard'},{id:'profile',icon:'fa-user',label:'My Profile'},{id:'members',icon:'fa-users',label:'Members'},{id:'announcements',icon:'fa-bullhorn',label:'Announcements'},{id:'leaderboard',icon:'fa-ranking-star',label:'Leaderboard'},{id:'events',icon:'fa-calendar-alt',label:'Events'},{id:'settings',icon:'fa-cog',label:'Settings'}];
var ADMIN_NAV=[{id:'admin-mem',icon:'fa-user-shield',label:'Manage Members'},{id:'admin-add',icon:'fa-user-plus',label:'Add / Remove'},{id:'admin-ann',icon:'fa-bullhorn',label:'Post Announcement'},{id:'admin-evt',icon:'fa-calendar-plus',label:'Manage Events'},{id:'admin-init',icon:'fa-database',label:'Initialize Cloud DB'}];

var CU=null,CV='dashboard',VA=null,PT='details',fbDB=null,fbOn=false,cache={},theme='dark',charts={},CREDENTIALS={},ALL_ADNOS=[].concat(DEFAULT_ADNOS);

// Build credentials
CREDENTIALS['ADMINISTRATOR']='Anshif@29';
for(var i=0;i<ALL_ADNOS.length;i++){CREDENTIALS[ALL_ADNOS[i]]=ALL_ADNOS[i]+'@fath';}

// ========== FIREBASE ==========
function initFB(){try{if(FB_CFG.apiKey==='YOUR_API_KEY'){setFS(false,'Local Mode');return;}if(typeof firebase==='undefined'){setFS(false,'Local Mode');return;}firebase.initializeApp(FB_CFG);fbDB=firebase.firestore();fbDB.collection('users').doc('ADMINISTRATOR').get().then(function(){fbOn=true;setFS(true,'Cloud');syncFromCloud();}).catch(function(){fbOn=false;setFS(false,'Cloud Error');});}catch(e){fbOn=false;setFS(false,'Local Mode');}}
function setFS(on,txt){var d1=document.getElementById('fb-d1'),d2=document.getElementById('fb-d2'),t1=document.getElementById('fb-t1'),t2=document.getElementById('fb-t2');if(d1)d1.className='sdot '+(on?'son':'soff');if(d2)d2.className='sdot '+(on?'son':'soff');if(t1)t1.textContent=txt;if(t2)t2.textContent=txt;}

async function syncFromCloud(){if(!fbOn||!fbDB)return;try{var snap=await fbDB.collection('users').get();snap.forEach(function(doc){var d=doc.data();d.details=d.details||defU(doc.id).details;d.skills=d.skills||[];d.achievements=d.achievements||[];cache[doc.id]=d;localStorage.setItem('pu_'+doc.id,JSON.stringify(d));CREDENTIALS[doc.id]=d.password;if(ALL_ADNOS.indexOf(doc.id)===-1&&doc.id!=='ADMINISTRATOR')ALL_ADNOS.push(doc.id);});}catch(e){}}

// ========== DATA LAYER ==========
function defU(id){return{password:id==='ADMINISTRATOR'?'Anshif@29':id+'@fath',role:id==='ADMINISTRATOR'?'admin':'member',details:{fullName:id==='ADMINISTRATOR'?'Administrator':'',dob:'',class:'',guardian:'',motherName:'',phone:'',address:'',email:'',bloodGroup:''},skills:[],achievements:[]};}
function loadUSync(id){if(cache[id])return cache[id];try{var ls=localStorage.getItem('pu_'+id);if(ls){cache[id]=JSON.parse(ls);return cache[id];}}catch(e){}cache[id]=defU(id);return cache[id];}
function saveU(id,data){cache[id]=data;try{localStorage.setItem('pu_'+id,JSON.stringify(data));}catch(e){}
if(fbOn&&fbDB){fbDB.collection('users').doc(id).set(data).catch(function(e){});}}
function loadAll(){var users={};var allIds=['ADMINISTRATOR'].concat(ALL_ADNOS);for(var i=0;i<allIds.length;i++){users[allIds[i]]=loadUSync(allIds[i]);}return users;}
function loadAnn(){try{return JSON.parse(localStorage.getItem('pu_ann')||'[]');}catch(e){return[];}}
function saveAnn(list){try{localStorage.setItem('pu_ann',JSON.stringify(list));}catch(e){}if(fbOn&&fbDB){fbDB.collection('data').doc('announcements').set({list:list}).catch(function(){});}}
function loadEvts(){try{return JSON.parse(localStorage.getItem('pu_evts')||'[]');}catch(e){return[];}}
function saveEvts(list){try{localStorage.setItem('pu_evts',JSON.stringify(list));}catch(e){}if(fbOn&&fbDB){fbDB.collection('data').doc('events').set({list:list}).catch(function(){});}}

// ========== SEED ==========
function seedAll(){var allIds=['ADMINISTRATOR'].concat(DEFAULT_ADNOS);for(var i=0;i<allIds.length;i++){var id=allIds[i];if(!localStorage.getItem('pu_'+id)){localStorage.setItem('pu_'+id,JSON.stringify(defU(id)));}}
if(!localStorage.getItem('pu_ann')){var ds=new Date().toLocaleDateString('en-GB');localStorage.setItem('pu_ann',JSON.stringify([{title:'Welcome to Academic Portal',content:'Complete your profiles.',important:true,date:ds,author:'Administrator'}]));}
if(!localStorage.getItem('pu_evts')){var now=new Date();var y=now.getFullYear();var m=String(now.getMonth()+1).padStart(2,'0');localStorage.setItem('pu_evts',JSON.stringify([{title:'Annual Day',date:y+'-'+m+'-15',time:'09:00',venue:'Auditorium',description:'Annual celebration',color:'#eab308'}]));}}

// ========== AVATAR ==========
function avC(id){var h=0;for(var i=0;i<String(id).length;i++)h=String(id).charCodeAt(i)+((h<<5)-h);return ACO[Math.abs(h)%ACO.length];}
function avI(u,id){if(u.details&&u.details.fullName&&u.details.fullName.trim()){var p=u.details.fullName.trim().split(/\s+/);return p.length>=2?(p[0][0]+p[p.length-1][0]).toUpperCase():p[0][0].toUpperCase();}return u.role==='admin'?'AD':String(id).slice(0,2).toUpperCase();}
function avH(u,id,cls){return'<div class="av '+(cls||'avs')+'" style="background:'+avC(id)+'">'+avI(u,id)+'</div>';}
function comp(u){if(u.role==='admin')return 100;var f=['fullName','dob','class','guardian','phone','address'];var n=0;for(var i=0;i<f.length;i++){if(u.details[f[i]]&&u.details[f[i]].trim())n++;}return Math.round(n/f.length*60+Math.min((u.skills||[]).length,3)/3*20+Math.min((u.achievements||[]).length,2)/2*20);}

// ========== PARTICLES ==========
function initParticles(){var cv=document.getElementById('particles-canvas');if(!cv)return;var ctx=cv.getContext('2d');var w,h,pts=[];function resize(){w=cv.width=cv.offsetWidth;h=cv.height=cv.offsetHeight;pts=[];for(var i=0;i<50;i++)pts.push({x:Math.random()*w,y:Math.random()*h,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,r:Math.random()*2+.5});}resize();window.addEventListener('resize',resize);function draw(){ctx.clearRect(0,0,w,h);for(var i=0;i<pts.length;i++){var p=pts[i];p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>w)p.vx*=-1;if(p.y<0||p.y>h)p.vy*=-1;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle='rgba(34,197,94,0.12)';ctx.fill();}for(var i=0;i<pts.length;i++)for(var j=i+1;j<pts.length;j++){var dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<110){ctx.beginPath();ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);ctx.strokeStyle='rgba(34,197,94,0.03)';ctx.stroke();}}requestAnimationFrame(draw);}draw();}

if(isA){var all=loadAll();var ads=Object.keys(all).filter(function(k){return k!=='ADMINISTRATOR';});var done=0,tSk=0,tAc=0;for(var i=0;i<ads.length;i++){if(comp(all[ads[i]])>=80)done++;tSk+=(all[ads[i]].skills||[]).length;tAc+=(all[ads[i]].achievements||[]).length;}

else{var anns=loadAnn();var evts=loadEvts();c.innerHTML='<div class="fi"><div class="mb-6"><h1 class="text-2xl font-bold">'+greet+', '+nm+'</h1><p class="text-sm" style="color:var(--t3)">Your academic journey</p></div><div class="grid grid-cols-2 gap-3 mb-5 stat-grid">'+sc('Profile',cp+'%','fa-user','var(--ac)','var(--acg)')+sc('Skills',(u.skills||[]).length,'fa-lightbulb','var(--pn)','var(--png)')+sc('Achievements',(u.achievements||[]).length,'fa-trophy','var(--pk)','var(--pkg)')+sc('Rank','—','fa-ranking-star','var(--gd)','var(--gdg)')+'</div><div class="card card-glow mb-5"><div class="flex items-center gap-3 mb-3"><div class="w-10 h-10 rounded-lg flex items-center justify-center" style="background:'+(cp>=80?'var(--acg)':'var(--gdg)')+'"><i class="fas '+(cp>=80?'fa-check-circle':'fa-exclamation-circle')+'" style="color:'+(cp>=80?'var(--ac)':'var(--gd)')+'"></i></div><div class="flex-1"><div class="font-semibold text-sm">Profile Completion: '+cp+'%</div><div class="text-xs" style="color:var(--t3)">'+(cp>=80?'Great job!':'Add more details to improve.')+'</div></div></div><div class="pb" style="height:8px"><div class="pf" style="width:'+cp+'%"></div></div></div><div class="flex flex-wrap gap-3"><button class="bp" onclick="nav(\'profile\')"><i class="fas fa-edit mr-2"></i>Edit Profile</button><button class="bs" onclick="nav(\'members\')"><i class="fas fa-users mr-2"></i>Members</button></div></div>';}}

// ========== ADMIN ADD/REMOVE ==========
function rAdminAdd(c){var all=loadAll();var ads=Object.keys(all).filter(function(k){return k!=='ADMINISTRATOR';});c.innerHTML='<div class="fi"><h1 class="text-xl font-bold mb-5">Add / Remove Members</h1><div class="card mb-5" style="border-color:rgba(34,197,94,.2)"><h3 class="text-base font-bold mb-4" style="color:var(--ac)"><i class="fas fa-user-plus mr-2"></i>Add New Member</h3><div class="flex flex-col sm:flex-row gap-3"><input type="text" id="new-adno" class="inp flex-1" placeholder="New Admission Number"><button class="bp" onclick="addMember()"><i class="fas fa-plus mr-2"></i>Add Member</button></div><p class="text-xs mt-2" style="color:var(--t3)">Password will be auto-set to: Adno@fath</p></div><div class="card" style="border-color:rgba(239,68,68,.15)"><h3 class="text-base font-bold mb-4" style="color:var(--dn)"><i class="fas fa-user-minus mr-2"></i>Remove Member</h3><div class="space-y-2">'+ads.map(function(a){var m=all[a];var mn=(m.details.fullName&&m.details.fullName.trim())||'—';return'<div class="flex items-center gap-3 p-3 rounded-lg" style="background:var(--bg1)">'+avH(m,a,'avs')+'<div class="flex-1 min-w-0"><div class="font-semibold text-sm">'+mn+'</div><div class="text-xs font-mono" style="color:var(--ac)">'+a+'</div></div><button class="bd" onclick="removeMember(\''+a+'\')"><i class="fas fa-trash-alt mr-1"></i>Remove</button></div>';}).join('')+'</div></div></div>';}

function addMember(){var adno=document.getElementById('new-adno').value.trim();if(!adno){toast('Enter admission number','err');return;}if(CREDENTIALS[adno]!==undefined){toast('Member already exists','err');return;}
var def=defU(adno);saveU(adno,def);CREDENTIALS[adno]=def.password;ALL_ADNOS.push(adno);document.getElementById('new-adno').value='';render();toast('Member '+adno+' added','ok');}
function removeMember(adno){if(adno==='ADMINISTRATOR'){toast('Cannot remove admin','err');return;}if(adno===CU){toast('Cannot remove yourself','err');return;}
cache[adno]=null;try{localStorage.removeItem('pu_'+adno);}catch(e){}delete CREDENTIALS[adno];var idx=ALL_ADNOS.indexOf(adno);if(idx>-1)ALL_ADNOS.splice(idx,1);if(fbOn&&fbDB){fbDB.collection('users').doc(adno).delete().catch(function(){});}render();toast('Member '+adno+' removed','ok');}

// ========== ANNOUNCEMENTS ==========
function rAnn(c,isA){var anns=loadAnn();c.innerHTML='<div class="fi"><div class="flex items-center justify-between mb-5"><h1 class="text-xl font-bold">Announcements</h1>'+(isA?'<button class="bp" onclick="showAnnForm()"><i class="fas fa-plus mr-2"></i>New</button>':'')+'</div>'+(anns.length===0?'<div class="card text-center py-10" style="color:var(--t3)">No announcements</div>':anns.map(function(a,i){return'<div class="ann-card '+(a.important?'imp':'')+' mb-3"><div class="flex items-start gap-3"><div class="w-10 h-10 rounded-lg flex items-center justify-center flex-shrink-0" style="background:'+(a.important?'var(--dng)':'var(--acg)')+'"><i class="fas '+(a.important?'fa-exclamation-triangle':'fa-bullhorn')+'" style="color:'+(a.important?'var(--dn)':'var(--ac)')+'"></i></div><div class="flex-1 min-w-0"><span class="font-semibold">'+a.title+'</span>'+(a.important?' <span class="badge ba">Important</span>':'')+'<p class="text-sm mt-1" style="color:var(--t2)">'+(a.content||'')+'</p><div class="text-xs mt-1" style="color:var(--t3)">'+(a.date||'')+'</div></div>'+(isA?'<button class="bd" onclick="rmAnn('+i+')"><i class="fas fa-trash-alt"></i></button>':'')+'</div></div>';}).join(''))+'</div>';}
function showAnnForm(){openModal('<h3 class="text-lg font-bold mb-4"><i class="fas fa-bullhorn mr-2" style="color:var(--ac)"></i>New Announcement</h3><div class="space-y-3"><div><label class="fl">Title</label><input type="text" id="ann-t" class="inp" placeholder="Title"></div><div><label class="fl">Content</label><textarea id="ann-c" class="inp" placeholder="Write announcement..."></textarea></div><div class="flex items-center gap-2"><input type="checkbox" id="ann-imp" style="accent-color:var(--ac)"><label class="text-sm" style="color:var(--t2)">Important</label></div><button class="bp w-full" onclick="postAnn()"><i class="fas fa-paper-plane mr-2"></i>Post</button></div>');}
function postAnn(){var t=document.getElementById('ann-t').value.trim();var ct=document.getElementById('ann-c').value.trim();var imp=document.getElementById('ann-imp').checked;if(!t){toast('Enter title','err');return;}var anns=loadAnn();var u=loadUSync(CU);anns.unshift({title:t,content:ct,important:imp,date:new Date().toLocaleDateString('en-GB'),author:(u.details.fullName&&u.details.fullName.trim())||CU});saveAnn(anns);cmodal();render();toast('Posted','ok');}
function rmAnn(i){var anns=loadAnn();anns.splice(i,1);saveAnn(anns);render();toast('Removed','inf');}

// ========== LEADERBOARD ==========
function rLB(c){var all=loadAll();var ads=Object.keys(all).filter(function(k){return k!=='ADMINISTRATOR';});var sorted=ads.map(function(a){return{adno:a,details:all[a].details,skills:all[a].skills,achievements:all[a].achievements,role:all[a].role,score:((all[a].achievements||[]).length*10+(all[a].skills||[]).length*5+comp(all[a])/10)};}).sort(function(a,b){return b.score-a.score;});c.innerHTML='<div class="fi"><div class="mb-5"><h1 class="text-xl font-bold">Leaderboard</h1></div>'+(sorted.length>=3?'<div class="grid grid-cols-3 gap-3 mb-5">'+[1,0,2].map(function(idx){var s=sorted[idx];var r=[2,1,3][idx];return'<div class="card text-center"><div class="mb-2"><i class="fas '+(r===1?'fa-crown':'fa-medal')+'" style="color:'+(r===1?'var(--gd)':r===2?'#9ca3af':'#b45309')+';font-size:'+(r===1?'24px':'18px')+'"></i></div>'+avH(s,s.adno,r===1?'avl':'avm')+'<div class="font-bold text-sm mt-2">'+((s.details&&s.details.fullName&&s.details.fullName.trim())||s.adno)+'</div><div class="text-xs font-mono" style="color:var(--ac)">'+s.adno+'</div><div class="text-lg font-bold mt-1" style="color:'+(r===1?'var(--gd)':r===2?'#9ca3af':'#b45309')+'">'+Math.round(s.score)+' pts</div></div>';}).join('')+'</div>':'')+'<div class="card"><div class="space-y-1">'+sorted.map(function(s,i){return'<div class="lb-row"><div class="w-8 text-center font-bold text-sm" style="color:'+(i<3?'var(--gd)':'var(--t3)')+'">'+(i+1)+'</div>'+avH(s,s.adno,'avs')+'<div class="flex-1 min-w-0"><div class="font-semibold text-sm truncate">'+((s.details&&s.details.fullName&&s.details.fullName.trim())||s.adno)+'</div><div class="text-xs" style="color:var(--t3)">'+(s.skills||[]).length+' skills &middot; '+(s.achievements||[]).length+' achv</div></div><div class="text-right"><div class="font-bold text-sm" style="color:var(--ac)">'+Math.round(s.score)+'</div><div class="text-xs" style="color:var(--t3)">pts</div></div></div>';}).join('')+'</div></div></div>';}

// ========== EVENTS ==========
function rEvts(c,isA){var evts=loadEvts();var now=new Date();var thisMonth=now.getMonth();var thisYear=now.getFullYear();var monthNames=['January','February','March','April','May','June','July','August','September','October','November','December'];var daysInMonth=new Date(thisYear,thisMonth+1,0).getDate();var firstDay=new Date(thisYear,thisMonth,1).getDay();c.innerHTML='<div class="fi"><div class="flex items-center justify-between mb-5"><div><h1 class="text-xl font-bold">Events</h1><p class="text-xs" style="color:var(--t3)">'+monthNames[thisMonth]+' '+thisYear+'</p></div>'+(isA?'<button class="bp" onclick="showEvtForm()"><i class="fas fa-plus mr-2"></i>Add Event</button>':'')+'</div><div class="grid grid-cols-1 lg:grid-cols-3 gap-4"><div class="card lg:col-span-2"><h3 class="text-sm font-bold mb-3"><i class="fas fa-calendar-alt mr-2" style="color:var(--ac)"></i>Calendar</h3><div class="grid grid-cols-7 gap-1 text-center text-xs mb-2" style="color:var(--t3)">'+['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(function(d){return'<div class="py-1 font-semibold">'+d+'</div>';}).join('')+'</div><div class="grid grid-cols-7 gap-1 text-center text-sm">'+Array(firstDay).fill('<div></div>').join('')+Array(daysInMonth).fill(0).map(function(_,i){var day=i+1;var dateStr=thisYear+'-'+String(thisMonth+1).padStart(2,'0')+'-'+String(day).padStart(2,'0');var dayEvts=evts.filter(function(e){return e.date===dateStr;});var isToday=day===now.getDate();return'<div class="py-2 rounded-lg'+(isToday?' font-bold':'')+'" style="'+(isToday?'background:var(--acg2);color:var(--ac)':'')+'">'+day+(dayEvts.length?'<div class="flex gap-0.5 justify-center mt-0.5">'+dayEvts.map(function(e){return'<div class="w-1.5 h-1.5 rounded-full" style="background:'+(e.color||'var(--ac)')+'"></div>';}).join('')+'</div>':'')+'</div>';}).join('')+'</div></div><div class="card"><h3 class="text-sm font-bold mb-3"><i class="fas fa-list mr-2" style="color:var(--gd)"></i>Events</h3>'+(evts.length===0?'<p class="text-sm" style="color:var(--t3)">No events</p>':evts.map(function(ev,i){return'<div class="flex items-start gap-3 mb-3 p-3 rounded-lg" style="background:var(--bg1)"><div class="evt-dot mt-1.5" style="background:'+(ev.color||'var(--ac)')+'"></div><div class="flex-1 min-w-0"><div class="font-semibold text-sm">'+ev.title+'</div><div class="text-xs" style="color:var(--t3)">'+(ev.date||'')+(ev.time?' &middot; '+ev.time:'')+'</div>'+(ev.venue?'<div class="text-xs" style="color:var(--t3)"><i class="fas fa-map-pin mr-1"></i>'+ev.venue+'</div>':'')+'</div>'+(isA?'<button class="bd" onclick="rmEvt('+i+')"><i class="fas fa-trash-alt"></i></button>':'')+'</div>';}).join(''))+'</div></div></div>';}
function showEvtForm(){openModal('<h3 class="text-lg font-bold mb-4"><i class="fas fa-calendar-plus mr-2" style="color:var(--ac)"></i>Add Event</h3><div class="space-y-3"><div><label class="fl">Title</label><input type="text" id="ev-t" class="inp" placeholder="Title"></div><div class="grid grid-cols-2 gap-3"><div><label class="fl">Date</label><input type="date" id="ev-d" class="inp"></div><div><label class="fl">Time</label><input type="time" id="ev-tm" class="inp"></div></div><div><label class="fl">Venue</label><input type="text" id="ev-v" class="inp" placeholder="Venue"></div><div><label class="fl">Color</label><div class="flex gap-2" id="ev-colors">'+['#22c55e','#eab308','#3b82f6','#8b5cf6','#ec4899','#f97316'].map(function(cl){return'<div onclick="document.querySelectorAll(\'#ev-colors div\').forEach(function(d){d.style.outline=\'\'});this.style.outline=\'2px solid var(--t1)\';this.dataset.sel=\'1\'" class="w-8 h-8 rounded-full cursor-pointer" style="background:'+cl+'" data-c="'+cl+'"></div>';}).join('')+'</div></div><button class="bp w-full" onclick="postEvt()"><i class="fas fa-plus mr-2"></i>Add Event</button></div>');}
function postEvt(){var t=document.getElementById('ev-t').value.trim();var d=document.getElementById('ev-d').value;var tm=document.getElementById('ev-tm').value;var v=document.getElementById('ev-v').value.trim();var selEl=document.querySelector('#ev-colors [data-sel="1"]');var cl=selEl?selEl.dataset.c:'#22c55e';if(!t){toast('Enter title','err');return;}var evts=loadEvts();evts.unshift({title:t,date:d,time:tm,venue:v,color:cl});saveEvts(evts);cmodal();render();toast('Event added','ok');}
function rmEvt(i){var evts=loadEvts();evts.splice(i,1);saveEvts(evts);render();toast('Removed','inf');}

// ========== SETTINGS ==========
function rSett(c){var u=loadUSync(CU);var isA=u.role==='admin';var admSec='';if(isA){var all=loadAll();var ads=Object.keys(all).filter(function(k){return k!=='ADMINISTRATOR';});admSec='<div class="card mt-5" style="border-color:rgba(234,179,8,.2)"><h3 class="text-base font-bold mb-4" style="color:var(--gd)"><i class="fas fa-user-shield mr-2"></i>Admin: Reset Member Password</h3><div class="grid grid-cols-1 md:grid-cols-3 gap-3"><div><label class="fl">Member</label><select id="apw-sel" class="inp"><option value="">-- Select --</option>'+ads.map(function(a){return'<option value="'+a+'">'+a+' - '+((all[a].details.fullName&&all[a].details.fullName.trim())||'—')+'</option>';}).join('')+'</select></div><div><label class="fl">New Password</label><input type="password" id="apw-new" class="inp" placeholder="Min 4 chars"></div><div class="flex items-end"><button class="bgt w-full" onclick="admPwSel()"><i class="fas fa-key mr-2"></i>Update</button></div></div></div>';}c.innerHTML='<div class="fi"><h1 class="text-xl font-bold mb-5">Settings</h1><div class="card mb-5"><h3 class="text-base font-bold mb-4"><i class="fas fa-palette mr-2" style="color:var(--ac)"></i>Appearance</h3><div class="flex items-center justify-between"><div><div class="font-semibold text-sm">Dark Mode</div></div><button class="bico" onclick="toggleTheme()" style="width:48px;height:28px;border-radius:14px;justify-content:'+(theme==='dark'?'flex-end':'flex-start')+';padding:2px 4px;background:'+(theme==='dark'?'var(--ac)':'var(--bd)')+'"><div style="width:20px;height:20px;border-radius:50%;background:var(--t1)"></div></button></div></div><div class="card"><h3 class="text-base font-bold mb-4"><i class="fas fa-key mr-2" style="color:var(--ac)"></i>Change My Password</h3><div class="space-y-3 max-w-md"><div><label class="fl">Current Password</label><input type="password" id="cpw-c" class="inp"></div><div><label class="fl">New Password</label><input type="password" id="cpw-n" class="inp"></div><div><label class="fl">Confirm</label><input type="password" id="cpw-f" class="inp"></div><button class="bp" onclick="chgPw()"><i class="fas fa-save mr-2"></i>Update Password</button></div></div>'+admSec+'</div>';}

// ========== ADMIN INIT CLOUD ==========
function rInit(c){c.innerHTML='<div class="fi"><h1 class="text-xl font-bold mb-5">Initialize Cloud Database</h1><div class="card"><div class="flex items-center gap-3 mb-4"><span class="sdot '+(fbOn?'son':'soff')+'"></span><span class="text-sm font-semibold" style="color:'+(fbOn?'var(--ac)':'var(--dn)')+'">'+(fbOn?'Firebase Connected':'Firebase Not Connected')+'</span></div>'+(fbOn?'<p class="text-sm mb-4" style="color:var(--t2)">Push all members to Cloud DB. This will overwrite cloud data.</p><button class="bgt" onclick="initCloudDB()"><i class="fas fa-cloud-upload-alt mr-2"></i>Initialize Cloud</button>':'<div class="p-4 rounded-xl" style="background:var(--dng);border:1px solid rgba(239,68,68,.15)"><p class="text-sm font-semibold mb-2" style="color:var(--dn)">Firebase not configured</p><p class="text-xs" style="color:var(--t2)">Paste your Firebase config in the FB_CFG variable at the top of the script.</p></div>')+'</div></div>';}
function initCloudDB(){if(!fbOn||!fbDB){toast('Firebase not connected','err');return;}var all=loadAll();var ids=Object.keys(all);var batch=fbDB.batch();for(var i=0;i<ids.length;i++){batch.set(fbDB.collection('users').doc(ids[i]),all[ids[i]]);}batch.commit().then(function(){toast('Cloud DB initialized with '+ids.length+' users','ok');}).catch(function(e){toast('Cloud init failed','err');});}

// ========== ACTIONS ==========
function saveDet(adno){var u=loadUSync(adno);['fullName','dob','class','guardian','motherName','phone','email','bloodGroup','address'].forEach(function(k){var el=document.getElementById('f-'+k);if(el)u.details[k]=el.value;});saveU(adno,u);updateSB();toast('Details saved','ok');}
function addSk(adno){var n=document.getElementById('nsk').value.trim();var l=document.getElementById('nsl').value;if(!n){toast('Enter skill name','err');return;}var u=loadUSync(adno);if(!u.skills)u.skills=[];u.skills.push({name:n,level:l});saveU(adno,u);document.getElementById('nsk').value='';render();toast('Skill added','ok');}
function rmSk(adno,i){var u=loadUSync(adno);u.skills.splice(i,1);saveU(adno,u);render();toast('Removed','inf');}
function addAch(adno){var t=document.getElementById('nat').value.trim();var d=document.getElementById('nad').value;var c=document.getElementById('nac').value;var dc=document.getElementById('nadc').value.trim();if(!t){toast('Enter title','err');return;}var u=loadUSync(adno);if(!u.achievements)u.achievements=[];u.achievements.push({title:t,date:d,category:c,description:dc});saveU(adno,u);render();toast('Achievement added','ok');}
function rmAch(adno,i){var u=loadUSync(adno);u.achievements.splice(i,1);saveU(adno,u);render();toast('Removed','inf');}
function chgPw(){var c=document.getElementById('cpw-c').value,n=document.getElementById('cpw-n').value,f=document.getElementById('cpw-f').value;var u=loadUSync(CU);if(c!==u.password){toast('Incorrect current password','err');return;}if(n.length<4){toast('Min 4 characters','err');return;}if(n!==f){toast('Passwords do not match','err');return;}u.password=n;saveU(CU,u);CREDENTIALS[CU]=n;document.getElementById('cpw-c').value='';document.getElementById('cpw-n').value='';document.getElementById('cpw-f').value='';toast('Password updated','ok');}
function admPw(adno){var e=document.getElementById('apw-'+adno);var n=e?e.value:'';if(!n||n.length<4){toast('Min 4 characters','err');return;}var u=loadUSync(adno);u.password=n;saveU(adno,u);CREDENTIALS[adno]=n;e.value='';toast('Password updated for '+adno,'ok');}
function admPwSel(){var a=document.getElementById('apw-sel').value;var n=document.getElementById('apw-new').value;if(!a){toast('Select member','err');return;}if(!n||n.length<4){toast('Min 4 characters','err');return;}var u=loadUSync(a);u.password=n;saveU(a,u);CREDENTIALS[a]=n;document.getElementById('apw-new').value='';document.getElementById('apw-sel').value='';toast('Password updated for '+a,'ok');}

// ========== TOAST / MODAL ==========
function toast(msg,type){var tc=document.getElementById('toasts');var t=document.createElement('div');var cls={ok:'tok',err:'terr',inf:'tinf'};var ico={ok:'fa-check-circle',err:'fa-exclamation-circle',inf:'fa-info-circle'};t.className='toast '+(cls[type]||cls.inf);t.innerHTML='<i class="fas '+(ico[type]||ico.inf)+'"></i><span>'+msg+'</span>';tc.appendChild(t);requestAnimationFrame(function(){t.classList.add('show');});setTimeout(function(){t.classList.remove('show');setTimeout(function(){t.remove();},400);},3000);}
function openModal(h){document.getElementById('modal-box').innerHTML=h;document.getElementById('modal-bg').classList.add('show');}
function cmodal(){document.getElementById('modal-bg').classList.remove('show');}

// ========== EVENT LISTENERS ==========
document.getElementById('login-form').addEventListener('submit',function(e){e.preventDefault();doLogin();});
document.getElementById('pw-toggle').addEventListener('click',function(){var inp=document.getElementById('l-pass');var ico=this.querySelector('i');if(inp.type==='password'){inp.type='text';ico.className='fas fa-eye-slash';}else{inp.type='password';ico.className='fas fa-eye';}});
document.getElementById('logout-btn').addEventListener('click',doLogout);
document.getElementById('theme-btn').addEventListener('click',toggleTheme);
document.getElementById('theme-btn2').addEventListener('click',toggleTheme);
document.getElementById('menu-btn').addEventListener('click',function(){document.getElementById('sb').classList.toggle('open');});
document.getElementById('modal-bg').addEventListener('click',function(e){if(e.target===this)cmodal();});

// ========== BOOT ==========
(function(){seedAll();try{theme=localStorage.getItem('portal_theme')||'dark';}catch(e){theme='dark';}if(theme==='light')document.body.classList.add('light');var e1=document.getElementById('theme-ico'),e2=document.getElementById('theme-ico2');if(e1)e1.className=theme==='dark'?'fas fa-moon':'fas fa-sun';if(e2)e2.className=theme==='dark'?'fas fa-moon':'fas fa-sun';initParticles();initFB();var saved=null;try{saved=localStorage.getItem('portal_cur');}catch(e){}if(saved&&CREDENTIALS[saved]!==undefined){CU=saved;showApp();}})();
</script>
</body>
